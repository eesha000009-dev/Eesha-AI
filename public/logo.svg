<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <!-- Metallic silver gradient for panels -->
    <linearGradient id="metalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8ee"/>
      <stop offset="30%" stop-color="#c0c0cc"/>
      <stop offset="60%" stop-color="#a0a0b0"/>
      <stop offset="100%" stop-color="#707088"/>
    </linearGradient>
    <linearGradient id="metalGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d0dd"/>
      <stop offset="50%" stop-color="#b0b0c0"/>
      <stop offset="100%" stop-color="#808098"/>
    </linearGradient>
    <linearGradient id="metalGrad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0ea"/>
      <stop offset="40%" stop-color="#c8c8d6"/>
      <stop offset="100%" stop-color="#909098"/>
    </linearGradient>
    <!-- Blue accent glow -->
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4488ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#66aaff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blueGlowV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4488ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#66aaff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.27  0 0 0 0 0.53  0 0 0 0 1  0 0 0 0.4 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle (for standalone display) -->
  <rect width="200" height="240" rx="24" fill="#000000"/>

  <!-- Stylized 3D "E" icon -->
  <g filter="url(#shadow)" transform="translate(30, 20)">
    <!-- Top panel of E - curved -->
    <path d="M20 15 Q20 8 28 8 L110 8 Q118 8 118 15 L118 35 Q118 42 110 42 L48 42 Q45 42 45 45 L45 50 Q45 53 42 53 L28 53 Q20 53 20 46 Z" fill="url(#metalGrad1)"/>
    <!-- Blue accent on inner edge of top panel -->
    <line x1="45" y1="42" x2="45" y2="53" stroke="url(#blueGlowV)" stroke-width="2.5" opacity="0.9"/>

    <!-- Middle panel of E - horizontal bar -->
    <path d="M20 72 Q20 65 28 65 L95 65 Q102 65 102 72 L102 92 Q102 99 95 99 L28 99 Q20 99 20 92 Z" fill="url(#metalGrad2)"/>
    <!-- Blue accent on right edge of middle panel -->
    <line x1="95" y1="65" x2="102" y2="72" stroke="url(#blueGlow)" stroke-width="2" opacity="0.7"/>

    <!-- Bottom panel of E - curved -->
    <path d="M20 112 Q20 105 28 105 L110 105 Q118 105 118 112 L118 132 Q118 139 110 139 L28 139 Q20 139 20 132 L20 120 Q20 117 23 117 L42 117 Q45 117 45 114 L45 112 Q45 105 48 105" fill="url(#metalGrad3)"/>
    <!-- Blue accent on inner edge of bottom panel -->
    <line x1="45" y1="105" x2="45" y2="117" stroke="url(#blueGlowV)" stroke-width="2.5" opacity="0.9"/>

    <!-- Vertical stem connecting all bars -->
    <path d="M20 15 Q20 8 28 8 L28 8 L28 139 Q20 139 20 132 L20 15 Z" fill="url(#metalGrad1)" opacity="0.95"/>
  </g>

  <!-- "eesha" text -->
  <text x="100" y="200" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#ffffff" letter-spacing="4">
    eesha
  </text>

  <!-- Subtle "AI" text -->
  <text x="162" y="200" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#66aaff" letter-spacing="1" opacity="0.9">
    AI
  </text>
</svg>
